<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treino">
<meta name="theme-color" content="#14171A">
<title>Diário de Treino</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root{
  --bg: #14171A;
  --panel: #1C2024;
  --panel-2: #22262B;
  --line: #2B3036;
  --chalk: #F2F0EA;
  --muted: #868D95;
  --musc: #FF6B4A;
  --musc-dim: #4A2C22;
  --cardio: #3ED9C4;
  --cardio-dim: #1D3A36;
  --lime: #C7F135;
  --rest: #34393F;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--chalk);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  padding:0 0 60px 0;
}

.wrap{
  max-width:640px;
  margin:0 auto;
  padding:24px 18px 0;
}

/* HEADER */
header{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:22px;
  border-bottom:2px solid var(--line);
  padding-bottom:16px;
}
.title{
  font-family:'Oswald',sans-serif;
  font-weight:700;
  font-size:26px;
  letter-spacing:0.5px;
  text-transform:uppercase;
}
.title span{color:var(--musc);}
.subtitle{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1px;
}

/* METAS */
.metas{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:22px;
}
.meta-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  padding:14px 14px 12px;
  position:relative;
  overflow:hidden;
}
.meta-card::before{
  content:'';
  position:absolute;
  top:0; left:0;
  width:4px; height:100%;
}
.meta-card.musc::before{background:var(--musc);}
.meta-card.cardio::before{background:var(--cardio);}
.meta-label{
  font-family:'Oswald',sans-serif;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:1px;
  font-weight:600;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:6px;
}
.meta-card.musc .meta-label{color:var(--musc);}
.meta-card.cardio .meta-label{color:var(--cardio);}
.meta-freq{
  font-family:'JetBrains Mono',monospace;
  font-size:22px;
  font-weight:600;
  margin-bottom:6px;
}
.meta-freq small{font-size:12px;color:var(--muted);font-weight:400;}
.meta-obj{
  font-size:12px;
  color:var(--muted);
  line-height:1.4;
  min-height:16px;
  cursor:pointer;
  border-bottom:1px dashed transparent;
}
.meta-obj:hover{border-bottom-color:var(--muted);}
.meta-edit-row{display:flex;gap:6px;align-items:center;margin-top:8px;}
.meta-edit-row input{
  width:44px;
  background:var(--panel-2);
  border:1px solid var(--line);
  color:var(--chalk);
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  border-radius:6px;
  padding:4px 6px;
  text-align:center;
}
.meta-edit-row button{
  background:none;
  border:1px solid var(--line);
  color:var(--muted);
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.5px;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
  font-family:'Inter',sans-serif;
}
.meta-edit-row button:hover{color:var(--chalk);border-color:var(--muted);}

/* PROGRESS BARS SEMANAIS */
.semana-progress{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  padding:14px 16px;
  margin-bottom:22px;
}
.sp-title{
  font-family:'Oswald',sans-serif;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--muted);
  margin-bottom:12px;
}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-row:last-child{margin-bottom:0;}
.bar-icon{width:14px;height:14px;border-radius:3px;flex-shrink:0;}
.bar-icon.musc{background:var(--musc);}
.bar-icon.cardio{background:var(--cardio);}
.bar-track{
  flex:1;
  height:8px;
  background:var(--panel-2);
  border-radius:4px;
  overflow:hidden;
}
.bar-fill{height:100%;border-radius:4px;transition:width .3s ease;}
.bar-fill.musc{background:var(--musc);}
.bar-fill.cardio{background:var(--cardio);}
.bar-count{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  color:var(--muted);
  min-width:38px;
  text-align:right;
}

/* CALENDARIO */
.cal-nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
}
.cal-nav button{
  background:var(--panel);
  border:1px solid var(--line);
  color:var(--chalk);
  width:32px;height:32px;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  display:flex;align-items:center;justify-content:center;
}
.cal-nav button:hover{border-color:var(--muted);}
.cal-month{
  font-family:'Oswald',sans-serif;
  font-size:16px;
  text-transform:uppercase;
  letter-spacing:1px;
  font-weight:600;
}

.weekdays{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-bottom:6px;
}
.weekdays div{
  text-align:center;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--muted);
  text-transform:uppercase;
}

.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-bottom:24px;
}
.day{
  aspect-ratio:1;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:8px;
  position:relative;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:transform .1s ease, border-color .15s ease;
  overflow:hidden;
}
.day:active{transform:scale(0.94);}
.day.empty{background:transparent;border:none;cursor:default;}
.day.today{border-color:var(--chalk);}
.day-num{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  color:var(--muted);
  z-index:2;
}
.day.hasmusc .day-num, .day.hascardio .day-num{color:var(--chalk);}
.day .stripe{
  position:absolute;
  bottom:0; left:0; right:0;
  height:5px;
  display:flex;
}
.day .stripe span{flex:1;}
.day.hasmusc .stripe .s-musc{background:var(--musc);}
.day.hascardio .stripe .s-cardio{background:var(--cardio);}
.day.rest{background:var(--panel-2);}
.day.rest .day-num{color:#5C6167;text-decoration:line-through;}

/* LEGENDA */
.legenda{
  display:flex;
  gap:16px;
  justify-content:center;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:22px;
  flex-wrap:wrap;
}
.legenda div{display:flex;align-items:center;gap:5px;}
.legenda .dot{width:8px;height:8px;border-radius:2px;}
.legenda .dot.musc{background:var(--musc);}
.legenda .dot.cardio{background:var(--cardio);}
.legenda .dot.rest{background:var(--rest);}

/* STREAK */
.streak-box{
  background:linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%);
  border:1px solid var(--line);
  border-radius:10px;
  padding:16px;
  text-align:center;
  margin-bottom:24px;
}
.streak-num{
  font-family:'Oswald',sans-serif;
  font-size:38px;
  font-weight:700;
  color:var(--lime);
  line-height:1;
}
.streak-label{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-top:4px;
}

/* MODAL */
.overlay{
  position:fixed; inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:100;
}
.overlay.open{display:flex;}
.modal{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:16px 16px 0 0;
  width:100%;
  max-width:640px;
  padding:22px 20px 28px;
  animation:slideup .2s ease;
}
@keyframes slideup{from{transform:translateY(30px);opacity:0;} to{transform:translateY(0);opacity:1;}}
.modal-date{
  font-family:'Oswald',sans-serif;
  font-size:18px;
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:16px;
}
.modal-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.opt{
  display:flex;
  align-items:center;
  gap:12px;
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:10px;
  padding:12px 14px;
  cursor:pointer;
}
.opt .sq{
  width:20px;height:20px;
  border-radius:5px;
  border:2px solid var(--muted);
  flex-shrink:0;
  transition:all .15s ease;
}
.opt.active.musc .sq{background:var(--musc);border-color:var(--musc);}
.opt.active.cardio .sq{background:var(--cardio);border-color:var(--cardio);}
.opt-label{
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:14px;
}
.modal-actions{display:flex;gap:10px;}
.modal-actions button{
  flex:1;
  padding:12px;
  border-radius:10px;
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
  border:1px solid var(--line);
}
.btn-close{background:var(--panel-2);color:var(--chalk);}
.btn-rest{background:none;color:var(--muted);}
.btn-rest.active{color:var(--chalk);border-color:var(--muted);}

.loading{
  text-align:center;
  color:var(--muted);
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  padding:40px 0;
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="title">Diário de <span>Treino</span></div>
      <div class="subtitle">musculação &amp; cardio</div>
    </div>
  </header>

  <div class="metas">
    <div class="meta-card musc" id="metaMusc">
      <div class="meta-label">🏋️ Musculação</div>
      <div class="meta-freq" id="mmFreqDisplay">-- <small>x / semana</small></div>
      <div class="meta-obj" id="mmObjDisplay">toque para definir objetivo</div>
    </div>
    <div class="meta-card cardio" id="metaCardio">
      <div class="meta-label">🏃 Cardio</div>
      <div class="meta-freq" id="mcFreqDisplay">-- <small>x / semana</small></div>
      <div class="meta-obj" id="mcObjDisplay">toque para definir objetivo</div>
    </div>
  </div>

  <div class="semana-progress">
    <div class="sp-title">Progresso desta semana</div>
    <div class="bar-row">
      <div class="bar-icon musc"></div>
      <div class="bar-track"><div class="bar-fill musc" id="barMusc" style="width:0%"></div></div>
      <div class="bar-count" id="barMuscCount">0/0</div>
    </div>
    <div class="bar-row">
      <div class="bar-icon cardio"></div>
      <div class="bar-track"><div class="bar-fill cardio" id="barCardio" style="width:0%"></div></div>
      <div class="bar-count" id="barCardioCount">0/0</div>
    </div>
  </div>

  <div class="streak-box">
    <div class="streak-num" id="streakNum">0</div>
    <div class="streak-label">dias seguidos treinando</div>
  </div>

  <div class="cal-nav">
    <button id="prevMonth">‹</button>
    <div class="cal-month" id="monthLabel">—</div>
    <button id="nextMonth">›</button>
  </div>

  <div class="weekdays">
    <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
  </div>

  <div class="grid" id="calGrid">
    <div class="loading">carregando...</div>
  </div>

  <div class="legenda">
    <div><span class="dot musc"></span>Musculação</div>
    <div><span class="dot cardio"></span>Cardio</div>
    <div><span class="dot rest"></span>Descanso marcado</div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-date" id="modalDate">—</div>
    <div class="modal-opts">
      <div class="opt musc" id="optMusc">
        <div class="sq"></div>
        <div class="opt-label">Treinei musculação</div>
      </div>
      <div class="opt cardio" id="optCardio">
        <div class="sq"></div>
        <div class="opt-label">Fiz cardio</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-rest" id="btnRest">Marcar descanso</button>
      <button class="btn-close" id="btnClose">Fechar</button>
    </div>
  </div>
</div>

<script>
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let current = new Date();
current.setDate(1);
let selectedDateKey = null;
let goals = { musc: { freq: 3, obj: '' }, cardio: { freq: 2, obj: '' } };
let monthData = {};

// Armazenamento local no próprio navegador (funciona offline no Safari/iPhone)
const STORAGE_PREFIX = 'diario-treino:';
const storage = {
  async get(key){
    try{
      const raw = localStorage.getItem(STORAGE_PREFIX + key);
      return raw === null ? null : { key, value: raw };
    }catch(e){ return null; }
  },
  async set(key, value){
    try{
      localStorage.setItem(STORAGE_PREFIX + key, value);
      return { key, value };
    }catch(e){ console.error('Não foi possível salvar', e); return null; }
  }
};

function pad(n){ return n.toString().padStart(2,'0'); }
function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function monthKey(y,m){ return `${y}-${pad(m+1)}`; }
function todayKey(){ const t=new Date(); return dateKey(t.getFullYear(), t.getMonth(), t.getDate()); }

async function loadGoals(){
  try{
    const res = await storage.get('goals');
    if(res && res.value){ goals = JSON.parse(res.value); }
  }catch(e){ /* no goals yet */ }
  renderGoals();
}

async function saveGoals(){
  try{ await storage.set('goals', JSON.stringify(goals)); }
  catch(e){ console.error('erro ao salvar metas', e); }
}

async function loadMonth(y,m){
  const key = 'month:' + monthKey(y,m);
  try{
    const res = await storage.get(key);
    monthData = (res && res.value) ? JSON.parse(res.value) : {};
  }catch(e){ monthData = {}; }
}

async function saveMonth(y,m){
  const key = 'month:' + monthKey(y,m);
  try{ await storage.set(key, JSON.stringify(monthData)); }
  catch(e){ console.error('erro ao salvar mes', e); }
}

function renderGoals(){
  document.getElementById('mmFreqDisplay').innerHTML = `${goals.musc.freq} <small>x / semana</small>`;
  document.getElementById('mcFreqDisplay').innerHTML = `${goals.cardio.freq} <small>x / semana</small>`;
  document.getElementById('mmObjDisplay').textContent = goals.musc.obj || 'toque para definir objetivo';
  document.getElementById('mcObjDisplay').textContent = goals.cardio.obj || 'toque para definir objetivo';
}

function editGoal(type){
  const card = document.getElementById(type === 'musc' ? 'metaMusc' : 'metaCardio');
  if(card.querySelector('.meta-edit-row')) return;
  const g = goals[type];
  const row = document.createElement('div');
  row.className = 'meta-edit-row';
  row.innerHTML = `
    <input type="number" min="0" max="14" id="freqInput_${type}" value="${g.freq}">
    <input type="text" id="objInput_${type}" placeholder="objetivo" value="${g.obj||''}" style="flex:1;text-align:left;width:auto;">
    <button id="saveGoal_${type}">OK</button>
  `;
  card.appendChild(row);
  document.getElementById(`saveGoal_${type}`).onclick = async (e) => {
    e.stopPropagation();
    const freq = parseInt(document.getElementById(`freqInput_${type}`).value) || 0;
    const obj = document.getElementById(`objInput_${type}`).value.trim();
    goals[type] = { freq, obj };
    await saveGoals();
    row.remove();
    renderGoals();
    renderWeekProgress();
  };
}

document.getElementById('metaMusc').addEventListener('click', (e) => { if(!e.target.closest('.meta-edit-row')) editGoal('musc'); });
document.getElementById('metaCardio').addEventListener('click', (e) => { if(!e.target.closest('.meta-edit-row')) editGoal('cardio'); });

function getWeekRange(refDate){
  const d = new Date(refDate);
  const day = d.getDay();
  const start = new Date(d); start.setDate(d.getDate() - day);
  const end = new Date(start); end.setDate(start.getDate() + 6);
  return {start, end};
}

async function renderWeekProgress(){
  const {start} = getWeekRange(new Date());
  let muscCount = 0, cardioCount = 0;
  for(let i=0;i<7;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    const y = d.getFullYear(), m = d.getMonth();
    const mk = 'month:' + monthKey(y,m);
    let data = (mk === 'month:' + monthKey(current.getFullYear(), current.getMonth())) ? monthData : null;
    if(!data){
      try{
        const res = await storage.get(mk);
        data = (res && res.value) ? JSON.parse(res.value) : {};
      }catch(e){ data = {}; }
    }
    const key = dateKey(y,m,d.getDate());
    const entry = data[key];
    if(entry && entry.musc) muscCount++;
    if(entry && entry.cardio) cardioCount++;
  }
  const muscGoal = goals.musc.freq || 1;
  const cardioGoal = goals.cardio.freq || 1;
  document.getElementById('barMusc').style.width = Math.min(100, (muscCount/muscGoal)*100) + '%';
  document.getElementById('barCardio').style.width = Math.min(100, (cardioCount/cardioGoal)*100) + '%';
  document.getElementById('barMuscCount').textContent = `${muscCount}/${goals.musc.freq}`;
  document.getElementById('barCardioCount').textContent = `${cardioCount}/${goals.cardio.freq}`;
}

async function computeStreak(){
  let streak = 0;
  let d = new Date();
  const cache = {};
  while(true){
    const y = d.getFullYear(), m = d.getMonth();
    const mk = monthKey(y,m);
    if(!(mk in cache)){
      try{
        const res = await storage.get('month:' + mk);
        cache[mk] = (res && res.value) ? JSON.parse(res.value) : {};
      }catch(e){ cache[mk] = {}; }
    }
    const key = dateKey(y,m,d.getDate());
    const entry = cache[mk][key];
    const trained = entry && (entry.musc || entry.cardio);
    const isRest = entry && entry.rest;
    if(trained){
      streak++;
      d.setDate(d.getDate()-1);
    } else if(isRest){
      d.setDate(d.getDate()-1);
    } else {
      break;
    }
    if(streak > 400) break;
  }
  document.getElementById('streakNum').textContent = streak;
}

async function renderCalendar(){
  const y = current.getFullYear(), m = current.getMonth();
  document.getElementById('monthLabel').textContent = `${MONTHS[m]} ${y}`;
  await loadMonth(y,m);

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const firstDay = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const tKey = todayKey();

  for(let i=0;i<firstDay;i++){
    const e = document.createElement('div');
    e.className = 'day empty';
    grid.appendChild(e);
  }

  for(let d=1; d<=daysInMonth; d++){
    const key = dateKey(y,m,d);
    const entry = monthData[key];
    const el = document.createElement('div');
    el.className = 'day';
    if(key === tKey) el.classList.add('today');
    if(entry && entry.musc) el.classList.add('hasmusc');
    if(entry && entry.cardio) el.classList.add('hascardio');
    if(entry && entry.rest) el.classList.add('rest');
    el.innerHTML = `
      <div class="day-num">${d}</div>
      <div class="stripe"><span class="s-musc"></span><span class="s-cardio"></span></div>
    `;
    el.addEventListener('click', () => openModal(key));
    grid.appendChild(el);
  }

  await renderWeekProgress();
  await computeStreak();
}

function openModal(key){
  selectedDateKey = key;
  const [y,m,d] = key.split('-').map(Number);
  const dateObj = new Date(y, m-1, d);
  const weekdayNames = ['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
  document.getElementById('modalDate').textContent = `${d} de ${MONTHS[m-1]} — ${weekdayNames[dateObj.getDay()]}`;

  const entry = monthData[key] || {};
  document.getElementById('optMusc').classList.toggle('active', !!entry.musc);
  document.getElementById('optCardio').classList.toggle('active', !!entry.cardio);
  document.getElementById('btnRest').classList.toggle('active', !!entry.rest);

  document.getElementById('overlay').classList.add('open');
}

async function toggleEntry(field){
  if(!selectedDateKey) return;
  const entry = monthData[selectedDateKey] || {};
  entry[field] = !entry[field];
  if(field !== 'rest' && entry[field]) entry.rest = false;
  if(field === 'rest' && entry.rest){ entry.musc = false; entry.cardio = false; }
  monthData[selectedDateKey] = entry;
  await saveMonth(current.getFullYear(), current.getMonth());

  document.getElementById('optMusc').classList.toggle('active', !!entry.musc);
  document.getElementById('optCardio').classList.toggle('active', !!entry.cardio);
  document.getElementById('btnRest').classList.toggle('active', !!entry.rest);

  await renderCalendar();
  openModal(selectedDateKey);
}

document.getElementById('optMusc').addEventListener('click', () => toggleEntry('musc'));
document.getElementById('optCardio').addEventListener('click', () => toggleEntry('cardio'));
document.getElementById('btnRest').addEventListener('click', () => toggleEntry('rest'));
document.getElementById('btnClose').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('open');
});
document.getElementById('overlay').addEventListener('click', (e) => {
  if(e.target.id === 'overlay') document.getElementById('overlay').classList.remove('open');
});

document.getElementById('prevMonth').addEventListener('click', () => {
  current.setMonth(current.getMonth()-1);
  renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  current.setMonth(current.getMonth()+1);
  renderCalendar();
});

window.addEventListener('error', (e) => {
  const grid = document.getElementById('calGrid');
  if(grid && grid.innerHTML.includes('carregando')){
    grid.innerHTML = `<div class="loading" style="grid-column:1/-1;color:#FF6B4A;">
      Algo deu errado ao carregar: ${e.message}<br>
      <span style="color:#868D95;font-size:11px;">Tente abrir este arquivo direto pelo app Safari (não pela pré-visualização do Arquivos).</span>
    </div>`;
  }
});

(async function init(){
  try{
    await loadGoals();
    await renderCalendar();
  }catch(err){
    console.error(err);
    const grid = document.getElementById('calGrid');
    grid.innerHTML = `<div class="loading" style="grid-column:1/-1;color:#FF6B4A;">
      Não consegui carregar: ${err.message}
    </div>`;
  }
})();
</script>
</body>
</html>
